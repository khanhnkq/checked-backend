name: CI

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Test & Docker Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests and package application JAR
        run: ./gradlew --no-daemon clean test bootJar

      - name: Validate Docker image build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: locket-clone:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            build/reports/tests/test/**
            build/test-results/test/**
          if-no-files-found: ignore

      - name: Upload packaged JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
